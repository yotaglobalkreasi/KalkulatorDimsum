<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalkulator Kasir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .app-container { height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        #matrix-container { display: flex; flex-direction: column; gap: 2px; height: 100%; padding: 4px; }
        .matrix-row { flex: 1; min-height: 0; display: grid; grid-template-columns: 1.2fr 1fr 1fr 1fr 1fr; gap: 2px; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 2px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

<div class="app-container w-full max-w-md bg-white relative">
    <header class="bg-pink-600 text-white px-4 py-2 flex justify-between items-center shadow-lg shrink-0 z-10">
        <div>
            <h1 class="text-sm font-extrabold tracking-tight" id="header-title">Kalkulator Kasir</h1>
            <p class="text-[9px] text-pink-200" id="current-date">Memuat...</p>
        </div>
        <div class="bg-pink-700/50 px-2 py-0.5 rounded-full border border-pink-500/30 flex items-center space-x-1">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
            <span class="text-[9px] font-bold text-pink-100" id="header-summary">0 Item</span>
        </div>
    </header>

    <main class="flex-1 min-h-0 relative flex flex-col">
        <div id="page-kasir" class="absolute inset-0 flex flex-col">
            <div id="matrix-container" class="flex-1"></div>
            <div class="bg-slate-50 border-t p-3 flex justify-between items-center shrink-0">
                <div>
                    <span class="text-[9px] font-bold text-slate-400 block uppercase">Total</span>
                    <span class="text-lg font-black text-slate-900" id="quick-total">Rp 0</span>
                </div>
                <button onclick="switchPage('cart')" class="bg-pink-600 text-white font-bold text-xs py-2 px-4 rounded-lg">Keranjang</button>
            </div>
        </div>
        
        <!-- Placeholder Halaman lainnya -->
        <div id="page-cart" class="absolute inset-0 hidden bg-white"></div>
        <div id="page-history" class="absolute inset-0 hidden bg-white"></div>
    </main>

    <script>
        const menuData = [
            { id: "ori-3", kategori: "Original", isi: 3, harga: 10000 },
            { id: "ori-4", kategori: "Original", isi: 4, harga: 15000 },
            { id: "ori-6", kategori: "Original", isi: 6, harga: 20000 },
            { id: "ori-10", kategori: "Original", isi: 10, harga: 28000 },
            { id: "men-3", kategori: "Mentai", isi: 3, harga: 15000 },
            { id: "men-4", kategori: "Mentai", isi: 4, harga: 17000 },
            { id: "men-6", kategori: "Mentai", isi: 6, harga: 25000 },
            { id: "men-10", kategori: "Mentai", isi: 10, harga: 38000 },
            { id: "moz-3", kategori: "Mozarella", isi: 3, harga: 17000 },
            { id: "moz-4", kategori: "Mozarella", isi: 4, harga: 21000 },
            { id: "moz-6", kategori: "Mozarella", isi: 6, harga: 28000 },
            { id: "moz-10", kategori: "Mozarella", isi: 10, harga: 45000 },
            { id: "mix-3", kategori: "Mix Cheese", isi: 3, harga: 17000 },
            { id: "mix-4", kategori: "Mix Cheese", isi: 4, harga: 21000 },
            { id: "mix-6", kategori: "Mix Cheese", isi: 6, harga: 28000 },
            { id: "mix-10", kategori: "Mix Cheese", isi: 10, harga: 43000 },
            { id: "chi-3", kategori: "Chili Oil", isi: 3, harga: 15000 },
            { id: "chi-4", kategori: "Chili Oil", isi: 4, harga: 20000 },
            { id: "chi-6", kategori: "Chili Oil", isi: 6, harga: 23000 },
            { id: "chi-10", kategori: "Chili Oil", isi: 10, harga: 35000 }
        ];

        let cart = [];
        const categories = ["Original", "Mentai", "Mozarella", "Mix Cheese", "Chili Oil"];
        const sizes = [3, 4, 6, 10];

        function formatRupiah(num) {
            return num.toLocaleString('id-ID');
        }

        function renderProducts() {
            const container = document.getElementById('matrix-container');
            container.innerHTML = '';
            categories.forEach(cat => {
                const row = document.createElement('div');
                row.className = "matrix-row";
                row.innerHTML = `<div class="flex items-center justify-center font-bold text-[15px] text-slate-700 bg-slate-100 rounded">${cat}</div>`;
                sizes.forEach(size => {
                    const item = menuData.find(m => m.kategori === cat && m.isi === size);
                    const qty = cart.find(c => c.id === item.id)?.qty || 0;
                    const btn = document.createElement('button');
                    btn.className = `flex flex-col items-center justify-center rounded border transition-all ${qty > 0 ? 'bg-pink-100 border-pink-500' : 'bg-white border-slate-200'}`;
                    btn.onclick = () => {
                        const existing = cart.find(c => c.id === item.id);
                        if(existing) existing.qty++; else cart.push({...item, qty: 1});
                        update();
                    };
                    btn.innerHTML = `<span class="font-black text-[15px] ${qty > 0 ? 'text-pink-700' : 'text-slate-700'}">${formatRupiah(item.harga)}</span>
                                     ${qty > 0 ? `<span class="text-[9px] font-bold text-pink-600">x${qty}</span>` : ''}`;
                    row.appendChild(btn);
                });
                container.appendChild(row);
            });
        }

        function update() {
            renderProducts();
            const total = cart.reduce((sum, item) => sum + (item.harga * item.qty), 0);
            document.getElementById('quick-total').innerText = 'Rp ' + formatRupiah(total);
            document.getElementById('header-summary').innerText = cart.reduce((s, i) => s + i.qty, 0) + ' Item';
        }

        window.onload = () => {
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', { dateStyle: 'long' });
            renderProducts();
        };
        
        function switchPage(p) { /* Navigasi... */ }
    </script>
</body>
</html>
